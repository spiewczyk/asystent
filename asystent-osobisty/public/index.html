<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Asystent dnia</title>
<meta name="theme-color" content="#ffffff" />
<link rel="manifest" href="/manifest.webmanifest" />
<link rel="apple-touch-icon" href="/icon-192.png" />
<style>
  :root{
    --bg:#ffffff; --surface:#f7f6f3; --line:#e9e8e3; --line2:#dcdbd5;
    --txt:#37352f; --muted:#787066; --hint:#9b9488;
    --red:#e24b4a; --redbg:#fbecec; --amber:#d9920a; --green:#2f9461; --blue:#2c6fd6; --bluebg:#eaf1fb;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
    color:var(--txt); background:var(--bg); line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:760px;margin:0 auto;padding:24px 18px 64px;}
  header{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:20px;}
  h1{font-size:22px;font-weight:600;margin:0;}
  .sub{font-size:14px;color:var(--muted);margin:3px 0 0;}
  .pill{font-size:12px;color:var(--hint);white-space:nowrap;}
  .card{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:16px 18px;}
  .surface{background:var(--surface);border-radius:12px;padding:14px;}
  .add{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:20px;}
  .add .row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;}
  input,select,button{font:inherit;color:var(--txt);}
  input[type=text],input[type=date],input[type=time],select{
    width:100%;height:40px;padding:0 12px;border:1px solid var(--line2);border-radius:8px;background:var(--bg);
  }
  input:focus,select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--bluebg);}
  label{font-size:12px;color:var(--muted);display:block;margin:0 0 4px 2px;}
  .btn{height:40px;padding:0 16px;border:1px solid var(--txt);background:var(--txt);color:#fff;border-radius:8px;cursor:pointer;font-weight:500;}
  .btn:hover{opacity:.9}
  .btn:active{transform:scale(.99)}
  .btn.ghost{background:var(--bg);color:var(--txt);border-color:var(--line2);}
  .counts{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px;}
  .count{background:var(--surface);border-radius:10px;padding:12px;}
  .count .n{font-size:24px;font-weight:600;margin-top:2px;}
  .count .l{font-size:12px;color:var(--muted);}
  .sect{font-size:15px;font-weight:600;margin:0 0 10px;}
  .task{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line);}
  .task:last-child{border-bottom:0}
  .task input[type=checkbox]{width:18px;height:18px;flex:none;accent-color:var(--txt);cursor:pointer;}
  .dot{width:8px;height:8px;border-radius:50%;flex:none;}
  .tname{flex:1;font-size:14px;}
  .tname.done{text-decoration:line-through;opacity:.45}
  .meta{font-size:12px;color:var(--muted);white-space:nowrap;}
  .tag{font-size:11px;background:var(--surface);color:var(--muted);padding:2px 9px;border-radius:7px;white-space:nowrap;}
  .tag.over{background:var(--redbg);color:var(--red);}
  .empty{color:var(--muted);font-size:14px;padding:18px 0;text-align:center;}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--txt);color:#fff;
    padding:10px 16px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;max-width:90%;}
  .toast.show{opacity:1}
  .muted-link{background:none;border:0;color:var(--blue);cursor:pointer;font-size:13px;padding:0;}
  @media(max-width:520px){ .counts{grid-template-columns:repeat(2,1fr)} h1{font-size:20px} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1 id="greet">Dzień dobry</h1>
      <p class="sub" id="datesub">…</p>
    </div>
    <span class="pill">połączono z Notion</span>
  </header>

  <div class="surface add">
    <input type="text" id="nazwa" placeholder="Co masz do zrobienia?" autocomplete="off" />
    <div class="row">
      <div><label for="data">Data</label><input type="date" id="data" /></div>
      <div><label for="godzina">Godzina</label><input type="time" id="godzina" /></div>
      <div><label for="prio">Priorytet</label>
        <select id="prio">
          <option value="">— priorytet —</option>
          <option>Wysoki</option><option selected>Średni</option><option>Niski</option>
        </select>
      </div>
      <div><label for="obszar">Obszar</label>
        <select id="obszar"><option value="">— obszar —</option></select>
      </div>
    </div>
    <div><button class="btn" id="addBtn">Dodaj zadanie</button></div>
  </div>

  <div class="counts">
    <div class="count"><div class="l">Do zrobienia</div><div class="n" id="cToday">–</div></div>
    <div class="count"><div class="l">Zaległe</div><div class="n" id="cOver">–</div></div>
    <div class="count"><div class="l">Wysoki priorytet</div><div class="n" id="cHigh">–</div></div>
    <div class="count"><div class="l">Rutyny dziś</div><div class="n" id="cRout">–</div></div>
  </div>

  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
      <p class="sect" style="margin:0">Dziś i zaległe</p>
      <button class="muted-link" id="reload">Odśwież</button>
    </div>
    <div id="list"><div class="empty">Ładowanie…</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = (id)=>document.getElementById(id);
let AREAS = [];

function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600); }

function dotColor(p){ return p==='Wysoki'?'var(--red)':p==='Niski'?'var(--hint)':'var(--amber)'; }

function fmtDateHeader(){
  const now=new Date();
  const d=new Intl.DateTimeFormat('pl-PL',{weekday:'long',day:'numeric',month:'long',timeZone:'Europe/Warsaw'}).format(now);
  return d.charAt(0).toUpperCase()+d.slice(1);
}

function areaName(ids){
  if(!ids||!ids.length) return null;
  const a=AREAS.find(x=>x.id===ids[0]);
  return a?a.name:null;
}

async function loadAreas(){
  try{
    const r=await fetch('/api/areas'); const j=await r.json();
    AREAS=j.areas||[];
    const sel=$('obszar');
    AREAS.forEach(a=>{ const o=document.createElement('option'); o.value=a.id; o.textContent=a.name; sel.appendChild(o); });
  }catch(e){ /* obszary opcjonalne */ }
}

async function loadTasks(){
  const list=$('list');
  list.innerHTML='<div class="empty">Ładowanie…</div>';
  try{
    const r=await fetch('/api/tasks'); const j=await r.json();
    if(!r.ok) throw new Error(j.error||'Błąd');
    $('cToday').textContent=j.counts.today;
    $('cOver').textContent=j.counts.overdue;
    $('cHigh').textContent=j.counts.high;
    $('cRout').textContent=j.counts.routines;
    render(j.tasks);
  }catch(e){
    list.innerHTML='<div class="empty">Nie udało się pobrać zadań: '+e.message+'</div>';
  }
}

function render(tasks){
  const list=$('list');
  if(!tasks.length){ list.innerHTML='<div class="empty">Nic na dziś — wszystko ogarnięte 🎉</div>'; return; }
  list.innerHTML='';
  tasks.forEach(t=>{
    const row=document.createElement('div'); row.className='task';
    const cb=document.createElement('input'); cb.type='checkbox';
    cb.addEventListener('change',()=>toggle(t.id,cb,name));
    const dot=document.createElement('span'); dot.className='dot'; dot.style.background=dotColor(t.priorytet);
    const name=document.createElement('span'); name.className='tname'+(t.bucket==='overdue'?'':''); name.textContent=t.name;
    if(t.bucket==='overdue') name.style.color='var(--red)';
    row.appendChild(cb); row.appendChild(dot); row.appendChild(name);
    if(t.godzina){ const m=document.createElement('span'); m.className='meta'; m.textContent=t.godzina; row.appendChild(m); }
    if(t.bucket==='overdue'){ const o=document.createElement('span'); o.className='tag over'; o.textContent='zaległe'; row.appendChild(o); }
    const an=areaName(t.areaIds);
    if(an){ const tg=document.createElement('span'); tg.className='tag'; tg.textContent=an; row.appendChild(tg); }
    list.appendChild(row);
  });
}

async function toggle(id,cb,nameEl){
  cb.disabled=true;
  try{
    const r=await fetch('/api/tasks',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,done:cb.checked})});
    if(!r.ok){ const j=await r.json(); throw new Error(j.error||'Błąd'); }
    nameEl.classList.toggle('done',cb.checked);
    toast(cb.checked?'Oznaczono jako zrobione':'Przywrócono');
    setTimeout(loadTasks,500);
  }catch(e){ cb.checked=!cb.checked; toast('Nie udało się zapisać: '+e.message); }
  finally{ cb.disabled=false; }
}

async function addTask(){
  const nazwa=$('nazwa').value.trim();
  if(!nazwa){ toast('Wpisz nazwę zadania'); $('nazwa').focus(); return; }
  const btn=$('addBtn'); btn.disabled=true; btn.textContent='Dodaję…';
  try{
    const body={ nazwa, date:$('data').value||undefined, godzina:$('godzina').value||undefined,
      priorytet:$('prio').value||undefined, obszarId:$('obszar').value||undefined };
    const r=await fetch('/api/tasks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const j=await r.json();
    if(!r.ok) throw new Error(j.error||'Błąd');
    $('nazwa').value=''; $('godzina').value='';
    toast('Dodano do Notion');
    loadTasks();
  }catch(e){ toast('Nie udało się dodać: '+e.message); }
  finally{ btn.disabled=false; btn.textContent='Dodaj zadanie'; }
}

function init(){
  $('greet').textContent='Dzień dobry, Franciszek';
  $('datesub').textContent=fmtDateHeader();
  const todayISO=new Intl.DateTimeFormat('en-CA',{timeZone:'Europe/Warsaw'}).format(new Date());
  $('data').value=todayISO;
  $('addBtn').addEventListener('click',addTask);
  $('nazwa').addEventListener('keydown',e=>{ if(e.key==='Enter') addTask(); });
  $('reload').addEventListener('click',loadTasks);
  loadAreas();
  loadTasks();
  if('serviceWorker' in navigator){ navigator.serviceWorker.register('/sw.js').catch(()=>{}); }
}
init();
</script>
</body>
</html>
